version: "3.9"
services:
  app:
    build: .
    container_name: flask_app
    restart: always
    expose:
      - "5000"
  nginx:
    image: nginx:latest
    container_name: nginx_server
    restart: always
    ports:
      - "80:80"
    volumes: 
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - app
