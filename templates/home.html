<!DOCTYPE html>
<html>
<head>
    <title>Cloud Kitchen</title>
    <style>
    body {
        font-family: 'Segoe UI', sans-serif;
        margin: 0;
        padding: 0;
        background: linear-gradient(135deg, #ff9966, #ff5e62);
        min-height: 100vh;
    }

    h1 {
        text-align: center;
        color: white;
        padding: 30px 0;
        font-size: 40px;
        letter-spacing: 1px;
    }

    .container {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        padding-bottom: 50px;
    }

    .card {
        background: white;
        width: 260px;
        margin: 20px;
        padding: 15px;
        border-radius: 15px;
        box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        transition: all 0.3s ease;
    }

    .card:hover {
        transform: translateY(-10px);
        box-shadow: 0 12px 25px rgba(0,0,0,0.3);
    }

    .card img {
        width: 100%;
        height: 190px;
        object-fit: cover;
        border-radius: 12px;
    }

    .card h3 {
        text-align: center;
        margin-top: 10px;
    }

    .card a {
        text-decoration: none;
        color: black;
    }
</style>

</head>
<body>

    <h1>🍴 Cloud Kitchen</h1>

    <div class="container">
        {% for recipe in recipes %}
            <div class="card">
                <a href="/recipe/{{ recipe.id }}">
                    <img src="{{ url_for('static', filename='images/' + recipe.image) }}">
                    <h3>{{ recipe.name }}</h3>
                </a>
            </div>
        {% endfor %}
    </div>

</body>
</html>
