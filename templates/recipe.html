<!DOCTYPE html>
<html>
<head>
    <title>{{ recipe.name }}</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #ffecd2, #fcb69f);
            text-align: center;
        }

        .card {
            background: white;
            width: 600px;
            margin: 40px auto;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.15);
        }

        img {
            width: 100%;
            border-radius: 10px;
        }

        .section {
            text-align: left;
            margin-top: 15px;
        }

        a {
            text-decoration: none;
            color: white;
            background-color: #ff6600;
            padding: 8px 15px;
            border-radius: 6px;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>{{ recipe.name }}</h1>
        <img src="{{ url_for('static', filename='images/' + recipe.image) }}">

        <div class="section">
            <h3>Description:</h3>
            <p>{{ recipe.description }}</p>

            <h3>Ingredients:</h3>
            <p>{{ recipe.ingredients }}</p>

            <h3>How to Prepare:</h3>
            <p style="white-space: pre-line;">{{ recipe.ingredients }}</p>
	    <p style="white-space: pre-line;">{{ recipe.steps }}</p>
        </div>

        <br>
        <a href="/">⬅ Back to Home</a>
    </div>

</body>
</html>
